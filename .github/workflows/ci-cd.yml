# neps-infrastructure/ci-cd/github-workflow-template.yml
name: NEPS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  check-structure:
    runs-on: ubuntu-latest
    outputs:
      SKIP_BUILD: ${{ steps.check.outputs.SKIP_BUILD }}
      SKIP_TEST: ${{ steps.check.outputs.SKIP_TEST }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for application files
        id: check
        run: |
          # Define dependency existence
          HAS_DEPS="false"
          if [ -f "requirements.txt" ] || [ -f "package.json" ]; then
            HAS_DEPS="true"
          fi

          if [ ! -f "Dockerfile" ]; then
            echo "::warning::No Dockerfile found. Skipping build."
            echo "SKIP_BUILD=true" >> $GITHUB_OUTPUT
          elif [ "$HAS_DEPS" = "false" ]; then
            echo "::warning::Dockerfile exists but no dependency file (package.json/requirements.txt) found. Skipping build to prevent failure."
            echo "SKIP_BUILD=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP_BUILD=false" >> $GITHUB_OUTPUT
          fi

          if [ "$HAS_DEPS" = "false" ]; then
            echo "::warning::No dependency file found. Skipping tests."
            echo "SKIP_TEST=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP_TEST=false" >> $GITHUB_OUTPUT
          fi

  test:
    needs: check-structure
    if: needs.check-structure.outputs.SKIP_TEST != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        if: hashFiles('requirements.txt') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Python deps
        if: hashFiles('requirements.txt') != ''
        run: pip install -r requirements.txt
      
      - name: Install Node deps
        if: hashFiles('package.json') != ''
        run: npm ci
      
      - name: Run tests
        run: |
          if [ -f "requirements.txt" ]; then
            pytest || echo "No tests yet"
          elif [ -f "package.json" ]; then
            npm test || echo "No tests yet"
          else
            echo "No tests yet"
          fi

  build:
    needs: [check-structure, test]
    if: always() && needs.check-structure.outputs.SKIP_BUILD != 'true' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/neps-digital/${{ github.event.repository.name }}:${{ github.sha }}
            ghcr.io/neps-digital/${{ github.event.repository.name }}:latest
