# neps-portal/.github/workflows/ci-cd.yml
name: NEPS Portal CI/CD

on:
  push:
    branches: [main, staging, feature/api-linkage-v2]
  pull_request:
    branches: [main, staging, feature/api-linkage-v2]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/nepsdigitalsystem/neps-portal

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --run

  build:
    needs: validate
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
      is-push: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.actor != 'dependabot[bot]'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT
          fi
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.actor != 'dependabot[bot]' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:latest', env.IMAGE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  security:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@v7

      # ═══════════════════════════════════════════════════════════════
      # DETERMINE SCAN CONFIGURATION
      # ═══════════════════════════════════════════════════════════════
      - name: Determine scan configuration
        id: scan-config
        run: |
          EVENT="${{ github.event_name }}"
          IS_PUSH="${{ needs.build.outputs.is-push }}"

          echo "Event type: $EVENT"
          echo "Is push (from build output): $IS_PUSH"

          if [ "$EVENT" == "push" ] && [ "$IS_PUSH" == "true" ]; then
            echo "Running IMAGE scan (push event)"
            echo "scan-type=image" >> $GITHUB_OUTPUT
            echo "scan-target=${{ env.IMAGE }}:${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "login-needed=true" >> $GITHUB_OUTPUT
            echo "exit-code=1" >> $GITHUB_OUTPUT
            echo "is-push=true" >> $GITHUB_OUTPUT
          else
            echo "Running FILESYSTEM scan (PR or non-push)"
            echo "scan-type=fs" >> $GITHUB_OUTPUT
            echo "scan-target=." >> $GITHUB_OUTPUT
            echo "login-needed=false" >> $GITHUB_OUTPUT
            echo "exit-code=0" >> $GITHUB_OUTPUT
            echo "is-push=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        if: steps.scan-config.outputs.login-needed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      # ═══════════════════════════════════════════════════════════════
      # RUN TRIVY SCAN
      # For PRs: filesystem scan, exit-code 0 (report only, don't fail)
      # For push: image scan, exit-code 1 (strict, fail on vulnerabilities)
      # ═══════════════════════════════════════════════════════════════
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: ${{ steps.scan-config.outputs.scan-type }}
          image-ref: ${{ steps.scan-config.outputs.is-push == 'true' && steps.scan-config.outputs.scan-target || '' }}
          scan-ref: ${{ steps.scan-config.outputs.is-push != 'true' && steps.scan-config.outputs.scan-target || '' }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: ${{ steps.scan-config.outputs.exit-code }}

      # ═══════════════════════════════════════════════════════════════
      # UPLOAD SARIF RESULTS
      # Always upload if SARIF file was produced, even if scan found issues
      # ═══════════════════════════════════════════════════════════════
      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          # Don't fail if SARIF is empty or missing
          wait-for-processing: false

  deploy:
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_HOST != ''
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/neps-infrastructure
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull neps-portal
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps neps-portal
            docker image prune -f
            echo "Deployed neps-portal:${{ github.sha }} at $(date)"
            echo "${{ github.sha }},neps-portal,$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> .deployment-history
