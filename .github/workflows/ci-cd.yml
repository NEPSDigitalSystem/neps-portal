# neps-portal/.github/workflows/ci-cd.yml
name: NEPS Portal CI/CD

on:
  push:
    branches: [main, staging, feature/api-linkage-v2]
  pull_request:
    branches: [main, staging, feature/api-linkage-v2]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/nepsdigitalsystem/neps-portal

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --run

  build:
    needs: validate
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.actor != 'dependabot[bot]'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_OUTPUT
          fi
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.actor != 'dependabot[bot]' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:latest', env.IMAGE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  security:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Determine scan configuration
        id: scan-config
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "scan-mode=image" >> "$GITHUB_OUTPUT"
            echo "scan-target=${{ env.IMAGE }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "login-needed=true" >> "$GITHUB_OUTPUT"
            echo "exit-code=1" >> "$GITHUB_OUTPUT"
          else
            echo "scan-mode=fs" >> "$GITHUB_OUTPUT"
            echo "scan-target=." >> "$GITHUB_OUTPUT"
            echo "login-needed=false" >> "$GITHUB_OUTPUT"
            echo "exit-code=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.scan-config.outputs.login-needed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      # PUSH: Scan Docker image (strict)
      - name: Run Trivy vulnerability scanner (image)
        if: steps.scan-config.outputs.scan-mode == 'image'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.scan-config.outputs.scan-target }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          cache: 'true'

      # PR: Scan filesystem (report only, don't block merge)
      - name: Run Trivy vulnerability scanner (filesystem)
        if: steps.scan-config.outputs.scan-mode == 'fs'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: ${{ steps.scan-config.outputs.scan-target }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          cache: 'true'

      - name: Check vulnerability count
        if: always() && hashFiles('trivy-results.sarif') != ''
        run: |
          if [ ! -f trivy-results.sarif ]; then
            echo "No SARIF file found, skipping vulnerability count check"
            exit 0
          fi
          
          # Count vulnerabilities by severity
          CRITICAL=$(jq '[.runs[].results[].ruleId] | map(select(contains("CRITICAL"))) | length' trivy-results.sarif 2>/dev/null || echo "0")
          HIGH=$(jq '[.runs[].results[].ruleId] | map(select(contains("HIGH"))) | length' trivy-results.sarif 2>/dev/null || echo "0")
          
          echo "Critical vulnerabilities: $CRITICAL"
          echo "High vulnerabilities: $HIGH"
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical vulnerabilities"
            exit 1
          fi
          
          if [ "$HIGH" -gt 5 ]; then
            echo "::warning::Found $HIGH high vulnerabilities (threshold: 5)"
          fi

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          wait-for-processing: false

  deploy:
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_HOST != ''
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/neps-infrastructure
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull neps-portal
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps neps-portal
            docker image prune -f
            echo "Deployed neps-portal:${{ github.sha }} at $(date)"
            echo "${{ github.sha }},neps-portal,$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> .deployment-history
